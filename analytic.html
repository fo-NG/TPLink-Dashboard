<style>
:root{--bg:#141417;--sf:#1c1d24;--sf2:#22242e;--br:#2e3040;--tx:#e8eaf0;--mu:#5a5e72;--ac:#f0c040}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:'Noto Sans Thai','Sarabun',system-ui,sans-serif}
#hdr{padding:10px 20px;background:var(--sf);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:16px}
.logo{font-size:22px;font-weight:500}.logo2{font-size:18px;color:var(--mu)}.sep{color:var(--br);font-size:18px}
.back-btn{margin-left:auto;font-size:12px;padding:5px 14px;border-radius:8px;border:1px solid var(--br);background:transparent;color:var(--mu);cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px}
.back-btn:hover{color:var(--tx);border-color:var(--mu)}

/* ── TIMELINE ── */
#v-timeline{padding:20px}
#tl-wrap{position:relative}
#tl-controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.ctl-btn{font-size:11px;padding:3px 10px;border-radius:10px;cursor:pointer;border:.5px solid var(--br);background:transparent;color:var(--mu);transition:.12s;user-select:none}
.ctl-btn:hover{color:var(--tx);border-color:var(--mu)}
.ctl-btn.on{border-color:var(--ac);color:var(--ac);background:rgba(240,192,64,.08)}
#tl-svg{display:block;width:100%}
#tl-tooltip{position:fixed;background:rgba(20,21,24,.97);border:.5px solid var(--br);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--tx);pointer-events:none;display:none;max-width:300px;line-height:1.7;box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:99}
#tl-tooltip b{color:#fff}
.tl-legend{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.tl-leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mu)}
.tl-leg-line{width:24px;height:3px;border-radius:2px}
.stat-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-card{background:var(--sf);border:.5px solid var(--br);border-radius:8px;padding:10px 14px;flex:1;min-width:120px}
.stat-v{font-size:22px;font-weight:500;color:var(--ac);line-height:1}
.stat-l{font-size:10px;color:var(--mu);margin-top:3px}
</style>

// ── TIMELINE ─────────────────────────────────────────────────────
let tlFilter = 'all';
let tlInited = false;
function initTimeline(){
  if(tlInited) return; tlInited=true;
  // Stats
  const motions = DATA.motions;
  const avgBaanyai = motions.reduce((s,m)=>s+m.baanyai_absent,0)/motions.length;
  const avgOthers = motions.reduce((s,m)=>s+m.others_absent,0)/motions.length;
  const localMotions = motions.filter(m=>m.is_local);
  const avgLocalBaanyai = localMotions.reduce((s,m)=>s+m.baanyai_absent,0)/(localMotions.length||1);
  document.getElementById('tl-stats').innerHTML = [
    ['มติทั้งหมด', motions.length],
    ['Absent เฉลี่ย (บ้านใหญ่)', avgBaanyai.toFixed(1)+'%'],
    ['Absent เฉลี่ย (ทั่วไป)', avgOthers.toFixed(1)+'%'],
    ['มติท้องถิ่น/ที่ดิน', localMotions.length],
    ['Absent ท้องถิ่น (บ้านใหญ่)', avgLocalBaanyai.toFixed(1)+'%'],
  ].map(([l,v])=>`<div class="stat-card"><div class="stat-v">${v}</div><div class="stat-l">${l}</div></div>`).join('');
  drawTimeline();
}

function setFilter(f, el){
  tlFilter=f;
  document.querySelectorAll('.ctl-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  drawTimeline();
}

function drawTimeline(){
  const all = DATA.motions;
  let motions;
  if(tlFilter==='all') motions=all;
  else if(tlFilter==='local') motions=all.filter(m=>m.is_local);
  else if(tlFilter==='sig') motions=all.filter(m=>m.sig);
  else motions=[...all].sort((a,b)=>b.gap-a.gap).slice(0,40);
  document.getElementById('tl-filter-count').textContent=`แสดง ${motions.length} มติ`;

  const svgEl = document.getElementById('tl-svg');
  const W = svgEl.parentElement.clientWidth - 40 || 900;
  const H = 380;
  const PAD={t:20,b:80,l:52,r:16};
  const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;

  const svg = d3.select('#tl-svg').attr('width',W).attr('height',H);
  svg.selectAll('*').remove();
  const g = svg.append('g').attr('transform',`translate(${PAD.l},${PAD.t})`);

  const x = d3.scaleLinear([0, motions.length-1],[0,iW]);
  const allVals = motions.flatMap(m=>[m.baanyai_absent,m.others_absent]);
  const y = d3.scaleLinear([0, Math.max(...allVals)+5],[iH,0]);

  // Grid lines
  g.selectAll('.gridline').data(y.ticks(5)).enter().append('line')
    .attr('x1',0).attr('x2',iW)
    .attr('y1',d=>y(d)).attr('y2',d=>y(d))
    .attr('stroke','#1e2030').attr('stroke-width',1);

  // Y axis
  g.append('g').call(d3.axisLeft(y).ticks(5).tickFormat(d=>d+'%'))
    .call(g=>g.select('.domain').remove())
    .call(g=>g.selectAll('.tick line').attr('stroke','#2e3040'))
    .call(g=>g.selectAll('.tick text').attr('fill','#5a5e72').attr('font-size',10));

  // Local motion markers (vertical bands)
  motions.forEach((m,i)=>{
    if(!m.is_local) return;
    g.append('rect')
      .attr('x',x(i)-2).attr('y',0).attr('width',4).attr('height',iH)
      .attr('fill','#22c55e').attr('opacity',.12);
    g.append('line')
      .attr('x1',x(i)).attr('y1',0).attr('x2',x(i)).attr('y2',iH)
      .attr('stroke','#22c55e').attr('stroke-width',1).attr('stroke-dasharray','2,3').attr('opacity',.6);
  });

  // Others line
  const lineOthers = d3.line().x((_,i)=>x(i)).y(d=>y(d.others_absent)).curve(d3.curveCatmullRom.alpha(0.5));
  g.append('path').datum(motions)
    .attr('fill','none').attr('stroke','#5090e0').attr('stroke-width',1.5).attr('opacity',.7)
    .attr('d',lineOthers);

  // Baanyai line
  const lineBaanyai = d3.line().x((_,i)=>x(i)).y(d=>y(d.baanyai_absent)).curve(d3.curveCatmullRom.alpha(0.5));
  g.append('path').datum(motions)
    .attr('fill','none').attr('stroke','#e88040').attr('stroke-width',2).attr('opacity',.9)
    .attr('d',lineBaanyai);

  // Gap fill area
  const area = d3.area()
    .x((_,i)=>x(i))
    .y0(d=>y(d.others_absent))
    .y1(d=>y(d.baanyai_absent))
    .curve(d3.curveCatmullRom.alpha(0.5));
  g.append('path').datum(motions)
    .attr('fill','#e88040').attr('opacity',.1)
    .attr('d',area);

  // Interaction overlay
  const tip = document.getElementById('tl-tooltip');
  g.append('rect')
    .attr('width',iW).attr('height',iH).attr('fill','transparent')
    .on('mousemove', function(ev){
      const [mx] = d3.pointer(ev, this);
      const idx = Math.round(x.invert(Math.max(0,Math.min(mx,iW))));
      const m = motions[Math.max(0,Math.min(idx,motions.length-1))];
      if(!m) return;
      tip.style.display='block';
      const gap = m.baanyai_absent - m.others_absent;
      tip.innerHTML=`<b>${m.title}</b><br>
        <span style="color:#e88040">บ้านใหญ่ขาด: ${m.baanyai_absent}%</span><br>
        <span style="color:#5090e0">ทั่วไปขาด: ${m.others_absent}%</span><br>
        <span style="color:${gap>0?'#e88040':'#4ab870'}">Gap: ${gap>0?'+':''}${gap.toFixed(1)}%</span>
        ${m.is_local?'<br><span style="color:#22c55e">มติท้องถิ่น/ที่ดิน</span>':''}
        ${m.sig?'<br><span style="color:#f0c040">มีนัยสำคัญทางสถิติ</span>':''}`;
      let tx=ev.clientX+14, ty=ev.clientY-12;
      if(tx+310>window.innerWidth)tx=ev.clientX-314;
      tip.style.left=tx+'px'; tip.style.top=ty+'px';
      // crosshair
      svg.selectAll('.crosshair').remove();
      const gx = x(idx)+PAD.l;
      svg.append('line').attr('class','crosshair')
        .attr('x1',gx).attr('y1',PAD.t).attr('x2',gx).attr('y2',H-PAD.b)
        .attr('stroke','#ffffff').attr('stroke-width',1).attr('opacity',.3).attr('stroke-dasharray','3,3');
    })
    .on('mouseleave',()=>{ tip.style.display='none'; svg.selectAll('.crosshair').remove(); });

  // X-axis note
  svg.append('text').attr('x',PAD.l+iW/2).attr('y',H-8)
    .attr('text-anchor','middle').attr('fill','#5a5e72').attr('font-size',10)
    .text(`มติ (n=${motions.length}) — เรียงตามลำดับในไฟล์ข้อมูล · เส้นสีเขียว = มติท้องถิ่น/ที่ดิน`);

  // Sig dots on baanyai line
  motions.forEach((m,i)=>{
    if(!m.sig) return;
    g.append('circle').attr('cx',x(i)).attr('cy',y(m.baanyai_absent))
      .attr('r',3).attr('fill','#f0c040').attr('stroke','#141417').attr('stroke-width',1);
  });
}

// Init
setTimeout(()=>{ initTimeline(); },100);
</script>
