<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>สาแหรกแห่งสภา v4</title>
<style>
:root{
  --bg:#141417;--sf:#1c1d24;--sf2:#22242e;--sf3:#282a36;
  --br:#2e3040;--br2:#3a3d50;--tx:#e8eaf0;--mu:#5a5e72;
  --ac:#f0c040;--red:#e84040;--grn:#4ab870;--blu:#5090e0;
  --pur:#c096ff;--ora:#f07830;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans Thai','Sarabun',system-ui,sans-serif}

/* Header */
#hdr{padding:9px 18px;background:var(--sf);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-size:15px;font-weight:700}.logo-sub{font-size:10px;color:var(--mu)}
#kpis{display:flex;gap:14px;margin-left:auto}
.kv{font-size:18px;font-weight:700;color:var(--ac);line-height:1}.kl{font-size:10px;color:var(--mu);margin-top:1px;text-align:center}

/* Legend */
#leg{display:flex;gap:7px;flex-wrap:wrap;padding:6px 18px;background:var(--bg);border-bottom:1px solid var(--br)}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--mu)}.lc{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* Canvas */
#wrap{position:relative}canvas{display:block}

/* Tooltip */
#tip{position:fixed;z-index:200;background:rgba(18,19,22,.97);border:1px solid var(--br);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--tx);display:none;max-width:300px;line-height:1.7;box-shadow:0 6px 20px rgba(0,0,0,.5);pointer-events:none}
#tip b{color:#fff}

/* ── Popup ── */
#pop{position:fixed;right:14px;top:68px;width:380px;max-height:calc(100vh - 82px);background:var(--sf);border:1px solid var(--br);border-radius:12px;display:none;flex-direction:column;z-index:150;box-shadow:0 12px 40px rgba(0,0,0,.6);overflow:hidden}
#ph{padding:11px 14px 8px;border-bottom:1px solid var(--br);flex-shrink:0;position:relative}
#pcl{position:absolute;top:9px;right:11px;cursor:pointer;color:var(--mu);font-size:14px;padding:2px 5px;border-radius:3px}
#pcl:hover{background:var(--sf2)}
#ptt{font-size:13px;font-weight:700;color:#fff}
#pss{font-size:11px;color:var(--mu);margin-top:2px}

/* Tabs */
#tabs{display:flex;gap:0;border-bottom:1px solid var(--br);flex-shrink:0;background:var(--sf2)}
.tab{padding:7px 14px;font-size:11px;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;transition:.12s;user-select:none}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}

#pb{overflow-y:auto;flex:1}
#pb::-webkit-scrollbar{width:4px}
#pb::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}

/* Sections */
.sec{padding:10px 14px;border-bottom:1px solid var(--br)}
.st{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}

/* Badges */
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:9px;font-weight:600;margin:2px}
.bh{background:rgba(240,192,64,.18);color:#f0c040}
.bm{background:rgba(100,160,255,.15);color:#64a0ff}
.bl{background:rgba(160,160,160,.1);color:#999}
.baoj{background:rgba(255,100,80,.15);color:#ff8070}
.bex{background:rgba(100,220,100,.12);color:#7de07d}
.bsw{background:rgba(200,140,255,.12);color:#c090ff}

/* Member items */
.mi{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mi:last-child{border-bottom:none}
.md{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mn{font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mp{font-size:10px;color:var(--mu);flex-shrink:0}

/* Term badge */
.term-badge{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--sf3);color:var(--mu);border:1px solid var(--br);font-weight:600;flex-shrink:0}
.term-badge.t23{border-color:#554;}
.term-badge.t24{border-color:#446;}
.term-badge.t25{border-color:#554;}
.term-badge.t26{border-color:#445;}
.term-badge.t27{border-color:#464;}

/* Stacked bar 100% */
.sbar-wrap{margin:6px 0}
.sbar-label{font-size:10px;color:var(--mu);margin-bottom:3px;display:flex;justify-content:space-between}
.sbar-track{display:flex;height:18px;border-radius:4px;overflow:hidden;width:100%}
.sbar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,.85);font-weight:600;overflow:hidden;transition:width .3s;min-width:0;white-space:nowrap}
.sbar-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.sleg{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--mu)}
.sleg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}

/* Delta bars */
.delta-wrap{margin:4px 0}
.delta-row{display:flex;align-items:center;gap:6px;padding:2px 0}
.delta-label{font-size:10px;color:var(--mu);width:130px;flex-shrink:0}
.delta-bar{flex:1;height:8px;position:relative;background:var(--sf2);border-radius:4px;overflow:visible}
.delta-fill{height:100%;border-radius:4px;position:absolute;top:0}
.delta-val{font-size:10px;font-weight:600;width:44px;text-align:right;flex-shrink:0}

/* Party trail */
.trail{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.tc{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}

/* Person card */
.pcard{background:var(--sf2);border-radius:7px;padding:8px 10px;margin:3px 0;cursor:pointer;border:1px solid transparent;transition:.12s}
.pcard:hover{border-color:var(--br2)}
.pcard-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.pcard-name{font-size:12px;font-weight:600;color:#fff;flex:1}
.pcard-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:10px;padding:1px 6px;border-radius:5px;font-weight:500}

/* Bill list */
.bill-item{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.bill-item:last-child{border-bottom:none}
.bill-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:5px;margin-left:4px;font-weight:600}
.tag-abs{background:rgba(232,64,64,.18);color:#e84040}
.tag-dis{background:rgba(200,100,255,.18);color:#cc80ff}
.tag-low{background:rgba(255,160,50,.18);color:#ffa030}

/* Person detail panel */
#pd{position:fixed;left:14px;top:68px;width:320px;max-height:calc(100vh - 82px);background:var(--sf);border:1px solid var(--br);border-radius:12px;display:none;flex-direction:column;z-index:149;box-shadow:0 12px 40px rgba(0,0,0,.6);overflow:hidden}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div style="font-size:26px;font-weight:500;letter-spacing:.02em;color:var(--color-text-primary)">Political Dynasty</div>
    <div style="font-size:23px;color:var(--color-text-secondary);margin-top:1px;letter-spacing:.01em">สาแหรกสภา</div>
    <div style="font-size:10px;color:var(--color-text-tertiary,#444);margin-top:3px">ส.ส. ชุด 23→24→25→26→27 · hover = ดูรายชื่อ · click = drill-down โหวต</div>
  </div>
  <div id="kpis"></div>
</div>
<div id="leg"></div>
<div id="wrap"><canvas id="cv"></canvas></div>
<div id="tip"></div>

<!-- Main popup -->
<div id="pop">
  <div id="ph">
    <span id="pcl" onclick="cpop()">✕</span>
    <div id="ptt"></div><div id="pss"></div>
  </div>
  <div id="tabs">
    <span class="tab on" onclick="switchTab('members',this)">สมาชิก</span>
    <span class="tab" onclick="switchTab('vote',this)">🗳 โหวต</span>
    <span class="tab" onclick="switchTab('bills',this)">📋 มติ</span>
  </div>
  <div id="pb"></div>
</div>

<!-- Person detail -->
<div id="pd">
  <div style="padding:11px 14px 8px;border-bottom:1px solid var(--br);flex-shrink:0;position:relative">
    <span onclick="document.getElementById('pd').style.display='none'" style="position:absolute;top:9px;right:11px;cursor:pointer;color:var(--mu);font-size:14px;padding:2px 5px;border-radius:3px">✕</span>
    <div id="pdtt" style="font-size:13px;font-weight:700;color:#fff"></div>
    <div id="pdss" style="font-size:11px;color:var(--mu);margin-top:2px"></div>
  </div>
  <div id="pdb" style="overflow-y:auto;flex:1;font-size:12px"></div>
</div>

<!-- KPI Modal Overlay -->
<div id="kpi-overlay" onclick="closeKpiModal(event)" style="position:fixed;inset:0;background:rgba(0,0,0,0);backdrop-filter:blur(0px);z-index:300;display:none;align-items:center;justify-content:center;transition:all .2s">
  <div id="kpi-modal" onclick="event.stopPropagation()" style="background:#ffffff;border:none;border-radius:12px;width:min(600px,92vw);max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.4);transform:scale(.96);transition:transform .18s">
    <!-- Header -->
    <div style="padding:14px 18px 12px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:12px;flex-shrink:0;background:#ffffff">
      <div>
        <div id="kpi-title" style="font-size:15px;font-weight:500;color:#111827"></div>
        <div id="kpi-count" style="font-size:11px;color:#6b7280;margin-top:2px"></div>
      </div>
      <button onclick="closeKpiModal()" style="margin-left:auto;font-size:13px;padding:5px 14px;border-radius:8px;border:1px solid #d1d5db;background:#f9fafb;color:#374151;cursor:pointer">กลับกราฟหลัก ✕</button>
    </div>
    <!-- Search -->
    <div style="padding:8px 14px;border-bottom:1px solid #e5e7eb;flex-shrink:0;background:#ffffff">
      <input id="kpi-search" type="text" placeholder="ค้นหาตระกูล หรือ จังหวัด..." oninput="renderKpiList()" style="width:100%;padding:6px 10px;font-size:12px;border:1px solid #d1d5db;border-radius:8px;background:#f9fafb;color:#111827">
    </div>
    <!-- List -->
    <div id="kpi-list" style="overflow-y:auto;flex:1;display:grid;grid-template-columns:1fr 1fr;gap:0;align-content:start;background:#ffffff"></div>
  </div>
</div>

// ── Canvas layout ──────────────────────────────────────────────────
const PAD={t:56,b:24,l:148,r:162};
const NW=24, NGAP=8;
let LAYOUT=null, hovState=null;

function computeLayout(W,H){
  const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;
  const colX={};
  TERMS.forEach((t,i)=>colX[t]=PAD.l+i*(iW/(TERMS.length-1)));
  const totals={};
  TERMS.forEach(t=>{
    const ns=DATA.nodes.filter(n=>n.term===t&&n.count>=2);
    totals[t]=ns.reduce((s,n)=>s+n.count,0);
  });
  const nodes={};
  TERMS.forEach(t=>{
    const ns=DATA.nodes.filter(n=>n.term===t&&n.count>=2)
      .sort((a,b)=>PORD.indexOf(a.party)-PORD.indexOf(b.party));
    const sh=iH-NGAP*(ns.length-1); let y=PAD.t;
    ns.forEach(n=>{
      const h=Math.max(5,(n.count/totals[t])*sh);
      nodes[`${t}_${n.party}`]={x0:colX[t]-NW/2,y0:y,x1:colX[t]+NW/2,y1:y+h,cx:colX[t],cy:y+h/2,h,...n};
      y+=h+NGAP;
    });
  });
  const srcOff={},tgtOff={};
  Object.keys(nodes).forEach(k=>{srcOff[k]=nodes[k].y0;tgtOff[k]=nodes[k].y0;});
  const slinks=[...DATA.links].sort((a,b)=>PORD.indexOf(a.from_party)-PORD.indexOf(b.from_party));
  const links=[];
  slinks.forEach(lk=>{
    if(!lk.value)return;
    const sk=`${lk.from_term}_${lk.from_party}`,tk=`${lk.to_term}_${lk.to_party}`;
    const sn=nodes[sk],tn=nodes[tk]; if(!sn||!tn)return;
    const nsp=DATA.nodes.filter(n=>n.term===lk.from_term&&n.count>=2).length;
    const ntp=DATA.nodes.filter(n=>n.term===lk.to_term&&n.count>=2).length;
    const sh=iH-NGAP*(nsp-1), th=iH-NGAP*(ntp-1);
    const hs=Math.max(2,(lk.value/totals[lk.from_term])*sh);
    const ht=Math.max(2,(lk.value/totals[lk.to_term])*th);
    const sy0=srcOff[sk]; srcOff[sk]+=hs;
    const ty0=tgtOff[tk]; tgtOff[tk]+=ht;
    links.push({x0:sn.x1,sy0,sy1:sy0+hs,x1:tn.x0,ty0,ty1:ty0+ht,
      from_party:lk.from_party,to_party:lk.to_party,value:lk.value,_d:lk,sk,tk});
  });
  return {nodes,links,colX,iW,iH,totals};
}

function draw(hov){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  if(!LAYOUT)return;
  const {nodes,links,colX}=LAYOUT;

  links.forEach(l=>{
    const sc=pc(l.from_party),tc=pc(l.to_party);
    const mx=(l.x0+l.x1)/2;
    const lk=`${l._d.from_term}_${l._d.from_party}_${l._d.to_term}_${l._d.to_party}`;
    const isH=hov&&hov.type==='link'&&hov.key===lk;
    const isNH=hov&&hov.type==='node'&&(hov.key===l.sk||hov.key===l.tk);
    const dim=hov&&!isH&&!isNH;
    const a=dim?.05:isH?.88:.52;
    function ha(c,al){return c+(Math.round(al*255).toString(16).padStart(2,'0'));}
    const g=ctx.createLinearGradient(l.x0,0,l.x1,0);
    g.addColorStop(0,ha(sc,a)); g.addColorStop(1,ha(tc,a));
    ctx.beginPath();ctx.moveTo(l.x0,l.sy0);
    ctx.bezierCurveTo(mx,l.sy0,mx,l.ty0,l.x1,l.ty0);
    ctx.lineTo(l.x1,l.ty1);ctx.bezierCurveTo(mx,l.ty1,mx,l.sy1,l.x0,l.sy1);
    ctx.closePath();ctx.fillStyle=g;ctx.fill();
  });

  Object.entries(nodes).forEach(([id,n])=>{
    const col=pc(n.party);
    const isH=hov&&hov.type==='node'&&hov.key===id;
    const dim=hov&&hov.type==='node'&&!isH;
    ctx.globalAlpha=dim?.22:1;
    ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(n.x0,n.y0,NW,n.h,3);ctx.fill();
    if(isH){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}
    ctx.globalAlpha=1;
    const isR=n.term===TERMS[TERMS.length-1],isL=n.term===TERMS[0];
    ctx.fillStyle=dim?'#333':'#cdd0e0';
    ctx.font=`${n.h<13?9:11}px 'Noto Sans Thai',sans-serif`;
    ctx.textBaseline='middle';
    if(isR){ctx.textAlign='left';ctx.fillText(`${n.party} (${n.count})`,n.x1+7,n.cy);}
    else if(isL){ctx.textAlign='right';ctx.fillText(`${n.party} (${n.count})`,n.x0-7,n.cy);}
    else{ctx.textAlign='center';ctx.fillText(`${n.party} (${n.count})`,n.cx,n.cy);}
  });

  TERMS.forEach(t=>{
    const cx=colX[t],tot=LAYOUT.totals[t];
    ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.globalAlpha=1;
    ctx.fillStyle='#e8eaf0';ctx.font='bold 14px "Noto Sans Thai",sans-serif';ctx.fillText(TL[t],cx,PAD.t-30);
    ctx.fillStyle='#5a5e72';ctx.font='10px "Noto Sans Thai",sans-serif';
    ctx.fillText(TY[t],cx,PAD.t-17);ctx.fillText(`${tot} ที่นั่ง`,cx,PAD.t-5);
    ctx.strokeStyle='#1e2030';ctx.lineWidth=1;ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.moveTo(cx,PAD.t);ctx.lineTo(cx,PAD.t+LAYOUT.iH);ctx.stroke();
    ctx.setLineDash([]);
  });
  // ── Coup marker between chut 24 and 25 ──────────────────────
  if(LAYOUT.colX['24']&&LAYOUT.colX['25']){
    const x24=LAYOUT.colX['24'], x25=LAYOUT.colX['25'];
    const coupX = (x24+x25)/2;
    const lineTop = PAD.t;
    const lineBot = PAD.t + LAYOUT.iH + 10;
    // ── 5px solid green line (full height) ──
    ctx.save();
    ctx.strokeStyle='#16a34a';
    ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(coupX, lineTop);ctx.lineTo(coupX, lineBot);ctx.stroke();
    ctx.restore();
    // ── Photo circle — same row as column headers (top) ──
    const imgR = 22;
    // Same Y as header text baseline: PAD.t - 30 is the header title Y
    const imgY = PAD.t - 30;
    const imgX = coupX;
    ctx.save();
    ctx.beginPath();
    ctx.arc(imgX, imgY, imgR, 0, Math.PI*2);
    ctx.clip();
    if(LAYOUT._coupImg&&LAYOUT._coupImg.complete){
      ctx.drawImage(LAYOUT._coupImg, imgX-imgR, imgY-imgR, imgR*2, imgR*2);
    }
    ctx.restore();
    // Green circle border
    ctx.save();
    ctx.strokeStyle='#22c55e';
    ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(imgX,imgY,imgR,0,Math.PI*2);ctx.stroke();
    ctx.restore();
    // Label below circle
    ctx.save();
    ctx.fillStyle='#16a34a';
    ctx.font='bold 10px "Noto Sans Thai",sans-serif';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('รัฐประหาร', coupX, imgY+imgR+3);
    ctx.fillStyle='#4ade80';
    ctx.font='9px "Noto Sans Thai",sans-serif';
    ctx.fillText('22 พ.ค. 2557', coupX, imgY+imgR+15);
    ctx.restore();
  }
}

function hitTest(mx,my){
  if(!LAYOUT)return null;
  const {nodes,links}=LAYOUT;
  for(const [id,n] of Object.entries(nodes)){
    if(mx>=n.x0&&mx<=n.x1&&my>=n.y0&&my<=n.y1)return{type:'node',key:id,data:n};
  }
  for(const l of links){
    const mnX=Math.min(l.x0,l.x1),mxX=Math.max(l.x0,l.x1);
    const mnY=Math.min(l.sy0,l.ty0),mxY=Math.max(l.sy1,l.ty1);
    if(mx<mnX||mx>mxX||my<mnY-2||my>mxY+2)continue;
    const t=(mx-l.x0)/(l.x1-l.x0),mt=1-t;
    const tY=mt*mt*l.sy0+2*mt*t*l.sy0+t*t*l.ty0;
    const bY=mt*mt*l.sy1+2*mt*t*l.sy1+t*t*l.ty1;
    if(my>=tY-3&&my<=bY+3){
      const lk=`${l._d.from_term}_${l._d.from_party}_${l._d.to_term}_${l._d.to_party}`;
      return{type:'link',key:lk,data:l};
    }
  }
  return null;
}

// ── Delta bar ──────────────────────────────────────────────────────
function deltaBar(label, famVal, cmpVal, color){
  if(famVal===null||famVal===undefined||cmpVal===null||cmpVal===undefined) return '';
  const diff=Math.round((famVal-cmpVal)*10)/10;
  const isPos=diff>0;
  const absD=Math.abs(diff);
  const barW=Math.min(absD*2,60); // scale
  const side=isPos?'left:50%':'right:50%';
  const clr=isPos?'#e88040':'#4ab870';
  const sign=isPos?'+':'';
  return `<div class="delta-row">
    <div class="delta-label">${label}</div>
    <div class="delta-bar">
      <div style="position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--br2)"></div>
      <div class="delta-fill" style="width:${barW}%;${side};background:${clr};opacity:.8"></div>
    </div>
    <div class="delta-val" style="color:${clr}">${sign}${diff}%</div>
  </div>`;
}

    h+=`<div class="sec"><div class="st">👑 ตระกูลบ้านใหญ่ (${bw.length})</div>`;
    const fGroups={};
    bw.forEach(p=>{const k=p.family_key||p.surname;if(!fGroups[k])fGroups[k]=[];fGroups[k].push(p);});
    Object.entries(fGroups).forEach(([k,ps])=>{
      const fam=DATA.families[k];
      if(fam) h+=`<div style="margin:4px 0 2px;cursor:pointer" onclick="openFP('${k}')"><span class="badge ${fam.level==='high'?'bh':fam.level==='medium'?'bm':'bl'}">${ps[0]?.surname||k}</span><span style="font-size:10px;color:var(--mu);margin-left:4px">${fam.province}</span></div>`;
      ps.forEach(p=>{h+=personCard(p,true);});
    });
    h+=`</div>`;
  }
  if(ot.length){
    h+=`<div class="sec"><div class="st">สมาชิก (${Math.min(ot.length,25)}/${ot.length})</div>`;
    ot.slice(0,25).forEach(p=>{h+=personCard(p,true);});
    h+=`</div>`;
  }
  return h;
}

// ── Render popup ───────────────────────────────────────────────────
function renderPop(){
  if(!curPopData)return;
  let persons=[], famKey=curFamKey||'', title='', sub='';

  if(curPopData.type==='link'){
    const lk=curPopData.lk;
    const col=pc(lk.from_party);
    title=`<span style="width:10px;height:10px;border-radius:2px;background:${col};display:inline-block;vertical-align:middle;margin-right:6px"></span>${lk.from_party} → <span style="color:${pc(lk.to_party)}">${lk.to_party}</span>`;
    sub=`ชุด ${lk.from_term}→${lk.to_term} · ${lk.value} คน`;
    persons=lk.persons||[];
  } else {
    const n=curPopData.n;
    const col=pc(n.party);
    title=`<span style="width:10px;height:10px;border-radius:2px;background:${col};display:inline-block;vertical-align:middle;margin-right:6px"></span>${n.party}`;
    sub=`${TL[n.term]} · ${n.count} คน`;
    const allP=DATA.links.filter(l=>(l.from_term===n.term&&l.from_party===n.party)||(l.to_term===n.term&&l.to_party===n.party)).flatMap(l=>l.persons||[]);
    const seen=new Set();
    persons=allP.filter(p=>{if(seen.has(p.name))return false;seen.add(p.name);return true;});
  }

  if(famKey&&curTab==='vote'){
    title=`<span style="width:10px;height:10px;border-radius:2px;background:${pc('')};display:inline-block;vertical-align:middle;margin-right:6px"></span>ตระกูล <b>${DATA.families[famKey]?.surname||famKey}</b>`;
    sub=`${DATA.families[famKey]?.province||''} · ${DATA.families[famKey]?.mp_count||0} สมาชิก`;
  }

  document.getElementById('ptt').innerHTML=title;
  document.getElementById('pss').textContent=sub;

  let content='';
  if(curTab==='members') content=membersTabHtml(persons, famKey);
  else if(curTab==='vote') content=famKey?voteTabHtml(famKey):'<div class="sec" style="color:var(--mu);font-size:12px">คลิกที่ตระกูลบ้านใหญ่ (badge สีทอง) ด้านล่างเพื่อดูกราฟโหวต</div>'+membersTabHtml(persons,famKey);
  else if(curTab==='bills') content=billsTabHtml(persons, famKey);

  document.getElementById('pb').innerHTML=content;
}

// ── Open family popup ──────────────────────────────────────────────
function openFP(key){
  curFamKey=key;
  const fam=DATA.families[key]; if(!fam)return;
  const parties=(fam.parties||'').split(',').map(s=>s.replace('พรรค','').trim()).filter(Boolean);
  const col=pc(parties[parties.length-1]||'');
  curPopData={type:'family',key};
  document.getElementById('ptt').innerHTML=`<span style="width:10px;height:10px;border-radius:2px;background:${col};display:inline-block;vertical-align:middle;margin-right:6px"></span>ตระกูล <b>${fam.surname}</b>`;
  document.getElementById('pss').textContent=`${fam.province} · ${fam.mp_count} สมาชิก`;

  // Build persons from family members
  const fmems=fam.members||[];
  const fvmems=(fam.voting?.members||[]);
  const persons=fmems.map(m=>{
    const vm=fvmems.find(v=>v.name===m.name)||{};
    return{name:m.name,province:fam.province,surname:fam.surname,
      family_key:key,baanyai_level:fam.level,
      terms:{[m.term]:m.party},
      voting:vm.voting||null};
  });

  // Show family header + badges
  const lv=fam.level||'';
  let famHdr=`<div class="sec">
    <span class="badge ${lv==='high'?'bh':lv==='medium'?'bm':'bl'}">${lv==='high'?'👑 High':lv==='medium'?'🔵 Medium':'⚪ Low'}</span>
    ${fam.explicit?'<span class="badge bex">✅ Explicit</span>':''}
    ${fam.aoj?'<span class="badge baoj">🏛 AOJ</span>':''}
    ${parties.length>1?'<span class="badge bsw">🔀 เปลี่ยนพรรค</span>':''}
    <div class="trail" style="margin-top:6px">`;
  const byTerm={};
  fmems.forEach(m=>{if(!byTerm[m.term])byTerm[m.term]=[];byTerm[m.term].push(m);});
  DATA.terms.forEach(t=>{
    const ms=byTerm[t]; if(!ms||!ms.length)return;
    const mc=pc(ms[0].party);
    famHdr+=`<span class="tc" style="background:${mc}22;color:${mc};border:1px solid ${mc}44">ชุด${t}: ${ms[0].party} (${ms.length})</span>`;
  });
  famHdr+=`</div></div>`;

  if(curTab==='members')
    document.getElementById('pb').innerHTML=famHdr+membersTabHtml(persons, key);
  else if(curTab==='vote')
    document.getElementById('pb').innerHTML=famHdr+voteTabHtml(key);
  else
    document.getElementById('pb').innerHTML=famHdr+billsTabHtml(persons, key);

  document.getElementById('pop').style.display='flex';
}

// ── Person detail panel ────────────────────────────────────────────
function openPD(p){
  const pd=document.getElementById('pd');
  const col=pc(p.party||'');
  const v=p.voting;
  document.getElementById('pdtt').innerHTML=`<span style="width:9px;height:9px;border-radius:50%;background:${col};display:inline-block;vertical-align:middle;margin-right:7px"></span>${p.name}`;
  document.getElementById('pdss').textContent=`${p.province||''} · ${Object.entries(p.terms||{}).map(([t,pa])=>`ชุด${t}:${pa}`).join(' → ')}`;

  let h='';
  if(v){
    // 5-bar 100%
    h+=`<div class="sec">
      <div class="st">📊 การโหวตส่วนตัว (${v.votes_n} ครั้ง)</div>
      ${stackedBar(v,p.name,`${v.votes_n}ครั้ง`)}
      ${stackedLegend()}
      <div style="border-top:1px solid var(--br);margin:8px 0 6px"></div>
      <div style="display:flex;gap:8px">
        <div style="flex:1;text-align:center">
          <div style="font-size:16px;font-weight:700;color:#5090e0">${fp(v.follow_party)}</div>
          <div style="font-size:9px;color:var(--mu)">ตามพรรค</div>
        </div>
        <div style="flex:1;text-align:center">
          <div style="font-size:16px;font-weight:700;color:#c096ff">${v.follow_party!==null&&v.follow_party!==undefined?fp(Math.round((100-v.follow_party)*10)/10):'—'}</div>
          <div style="font-size:9px;color:var(--mu)">สวนพรรค</div>
        </div>
      </div>
    </div>`;
    if(v.dissents?.length){
      h+=`<div class="sec"><div class="st">🚩 สวนพรรค (${v.dissents.length}ครั้ง)</div>`;
      v.dissents.forEach(d=>{h+=`<div class="bill-item">${d.bill}<span class="bill-tag tag-dis">สวน</span><br><span style="font-size:10px;color:var(--mu)">โหวต: ${d.vote} · พรรคว่า: ${d.party_says}</span></div>`;});
      h+=`</div>`;
    }
    if(v.absences?.length){
      h+=`<div class="sec"><div class="st">📭 ลา/ขาด (${v.absences.length}มติ)</div>`;
      v.absences.forEach(a=>{h+=`<div class="bill-item">${a.bill}<span class="bill-tag tag-abs">ขาด</span></div>`;});
      h+=`</div>`;
    }
  } else {
    h='<div class="sec" style="color:var(--mu)">ไม่พบข้อมูลการโหวต</div>';
  }
  document.getElementById('pdb').innerHTML=h;
  pd.style.display='flex';
}

document.addEventListener('click',e=>{
  if(!e.target.closest('#kpi-panel')&&!e.target.closest('#kpis'))
    document.getElementById('kpi-panel').style.display='none';
  if(!e.target.closest('#pop')&&!e.target.closest('#pd')&&e.target.id!=='cv'){
    cpop(); document.getElementById('pd').style.display='none';
  }
});

let _kpiFilter='all';

function openKpiList(filter){
  _kpiFilter=filter;
  const titles={'all':'ตระกูลบ้านใหญ่ทั้งหมด','high':'High Confidence','switch':'เปลี่ยนพรรค','aoj':'AOJ Linked'};
  document.getElementById('kpi-title').textContent=titles[filter]||filter;
  document.getElementById('kpi-search').value='';
  // Show overlay with animation
  const ov=document.getElementById('kpi-overlay');
  const md=document.getElementById('kpi-modal');
  ov.style.display='flex';
  requestAnimationFrame(()=>{
    ov.style.background='rgba(0,0,0,0.55)';
    ov.style.backdropFilter='blur(4px)';
    md.style.transform='scale(1)';
  });
  renderKpiList();
}

function closeKpiModal(e){
  if(e&&e.target!==document.getElementById('kpi-overlay')&&e.type==='click'&&e.currentTarget===document.getElementById('kpi-overlay'))return;
  const ov=document.getElementById('kpi-overlay');
  const md=document.getElementById('kpi-modal');
  ov.style.background='rgba(0,0,0,0)';
  ov.style.backdropFilter='blur(0px)';
  md.style.transform='scale(.96)';
  setTimeout(()=>{ ov.style.display='none'; },180);
}

function renderKpiList(){
  const q=(document.getElementById('kpi-search').value||'').trim().toLowerCase();
  const allFams=Object.entries(DATA.families);
  let list=allFams;
  if(_kpiFilter==='high')   list=allFams.filter(([,f])=>f.level==='high');
  if(_kpiFilter==='switch') list=allFams.filter(([,f])=>(f.parties||'').includes(','));
  if(_kpiFilter==='aoj')    list=allFams.filter(([,f])=>f.aoj);
  if(q) list=list.filter(([,f])=>f.surname.includes(q)||f.province.includes(q));
  const lvOrder={'high':0,'medium':1,'low':2};
  list=list.sort(([,a],[,b])=>(lvOrder[a.level]||3)-(lvOrder[b.level]||3)||a.province.localeCompare(b.province,'th'));
  document.getElementById('kpi-count').textContent=list.length+' ตระกูล';
  const PCM={'เพื่อไทย':'#E30613','ภูมิใจไทย':'#312682','ประชาชน/ก้าวไกล':'#FF6413','กล้าธรรม':'#003E72','พลังประชารัฐ':'#4061A6','ประชาธิปัตย์':'#15A5F5','รวมไทยสร้างชาติ':'#121F91','ชาติไทยพัฒนา':'#E90080','ประชาชาติ':'#BA810D'};
  const gpc=p=>{for(const[k,v] of Object.entries(PCM))if(p&&p.includes(k))return v;return '#888';};
  if(!list.length){
    document.getElementById('kpi-list').innerHTML='<div style="padding:2rem;text-align:center;font-size:12px;color:#9ca3af;grid-column:1/-1">ไม่พบรายการ</div>';
    return;
  }
  document.getElementById('kpi-list').innerHTML=list.map(([key,f])=>{
    const parties=(f.parties||'').split(',').map(s=>s.replace('พรรค','').trim()).filter(Boolean);
    const topParty=parties[parties.length-1]||'';
    const col=gpc(topParty);
    const lv=f.level||'';
    const lvStyle=lv==='high'?'background:rgba(240,192,64,.18);color:#f0c040':
                  lv==='medium'?'background:rgba(100,160,255,.15);color:#64a0ff':
                  'background:rgba(160,160,160,.1);color:#999';
    const aojTag=f.aoj?`<span style="font-size:9px;padding:1px 5px;border-radius:6px;background:rgba(255,100,80,.15);color:#ff8070">AOJ</span>`:'';
    const swTag=(f.parties||'').includes(',')?`<span style="font-size:9px;padding:1px 5px;border-radius:6px;background:rgba(200,140,255,.12);color:#c090ff">ย้าย</span>`:'';
    const chips=parties.slice(-2).map(p=>`<span style="font-size:9px;padding:1px 6px;border-radius:4px;background:${gpc(p)}22;color:${gpc(p)};border:.5px solid ${gpc(p)}44">${p}</span>`).join('');
    return `<div onclick="closeKpiModal();setTimeout(()=>openFP('${key}'),200)"
      style="padding:10px 14px;border-bottom:1px solid #f3f4f6;border-right:1px solid #f3f4f6;cursor:pointer;transition:.1s;background:#ffffff"
      onmouseover="this.style.background='#f9fafb'"
      onmouseout="this.style.background='#ffffff'">
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap">
        <span style="font-size:9px;padding:1px 6px;border-radius:7px;font-weight:500;${lvStyle}">${lv}</span>
        <span style="font-size:13px;font-weight:500;color:#111827">${f.surname}</span>
        ${aojTag}${swTag}
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-size:11px;color:#6b7280">${f.province}</span>
        <span style="font-size:10px;color:var(--color-text-secondary)">· ${f.mp_count} คน</span>
      </div>
      <div style="margin-top:4px;display:flex;gap:3px;flex-wrap:wrap">${chips}</div>
    </div>`;
  }).join('');
}

setup();
window.addEventListener('resize',setup);
</script>
